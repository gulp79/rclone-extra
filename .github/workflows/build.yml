      - name: Build Android Targets
        run: |
          set -euo pipefail
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ]; then VERSION="v1.73.2-android-extra"; fi
          FLAGS="-s -w -buildid= -X github.com/rclone/rclone/fs.Version=${VERSION}"

          mkdir -p build build-logs

          NDK_ROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          API="23"

          for ARCH in arm arm64 386 amd64; do
            echo "::group::Building for android/$ARCH"

            export GOOS=android
            export GOARCH=$ARCH
            export CGO_ENABLED=1

            if [ "$ARCH" == "arm" ]; then
              CC_BIN="$NDK_ROOT/armv7a-linux-androideabi${API}-clang"
            elif [ "$ARCH" == "arm64" ]; then
              CC_BIN="$NDK_ROOT/aarch64-linux-android${API}-clang"
            elif [ "$ARCH" == "386" ]; then
              CC_BIN="$NDK_ROOT/i686-linux-android${API}-clang"
            elif [ "$ARCH" == "amd64" ]; then
              CC_BIN="$NDK_ROOT/x86_64-linux-android${API}-clang"
            fi

            export CC="$CC_BIN"
            echo "Using compiler: $CC"

            go build -v -trimpath -mod=readonly -ldflags "$FLAGS" \
              -o build/rclone-android-$ARCH . 2>&1 | tee "build-logs/build-android-$ARCH.log"

            if [ -f "build/rclone-android-$ARCH" ]; then
              echo "✅ Successfully built rclone-android-$ARCH"
              ls -lh build/rclone-android-$ARCH
            else
              echo "❌ Failed to build rclone-android-$ARCH"
              exit 1
            fi
            echo "::endgroup::"
          done

      # FIX: carica anche i binari Android sulla release (solo su tag push)
      - name: Upload Android zip to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          zip rclone-android-all.zip -j build/rclone-android-*
          gh release upload ${{ github.ref_name }} rclone-android-all.zip --clobber

      - name: Upload Android Artifacts (per uso interno)
        uses: actions/upload-artifact@v7
        with:
          name: rclone-android-all
          path: build/rclone-android-*
          if-no-files-found: error

      - name: Upload Android build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: logs-android
          path: build-logs/build-android-*.log


  # --- JOB: PUBLISH (solo su tag push, dopo che build e android sono completati) ---
  publish:
    name: Publish to WinGet
    runs-on: ubuntu-latest
    needs: [build, android]  # aspetta che tutti i build siano finiti
    if: startsWith(github.ref, 'refs/tags/')  # solo su tag push, mai su workflow_dispatch

    steps:
      # Nota: winget-releaser legge gli asset già caricati sulla release da gh release upload
      # La regex '-windows-\w+\.zip$' troverà il file 'rclone-windows-amd64.zip'
      - name: Submit to WinGet via winget-releaser
        uses: vedantmgoyal2009/winget-releaser@v2
        with:
          identifier: Rclone.Rclone
          installers-regex: '-windows-\w+\.zip$'
          max-versions-to-keep: 0
          release-repository: rclone-extra
          release-tag: ${{ github.ref_name }}
          fork-user: gulp79
          token: ${{ secrets.WINGET_TOKEN }}  # PAT con accesso in scrittura al fork winget-pkgs
