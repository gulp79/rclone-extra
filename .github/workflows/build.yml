# Github Actions build for rclone (Custom & Clean)
# Status: PRODUCTION
# Features:
# - Windows: CGO enabled (cmount), FULL STATIC LINKING (No DLLs), Custom Icon
# - Linux: Pure Static (netgo), Multi-arch
# - Android: Multi-arch, Auto-NDK selection
name: build

on:
  workflow_dispatch:
    inputs:
      manual:
        description: Manual run
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # JOB 1: DESKTOP & SERVER
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
          - name: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'
          check-latest: true
          cache: true

      # --- WINDOWS PRE-REQUISITES ---
      - name: Install MinGW (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Setup WinFsp Headers (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          wget -q -O winfsp.zip https://github.com/winfsp/winfsp/archive/refs/tags/v2.0.zip
          unzip -q winfsp.zip
          echo "WINFSP_INC=$(pwd)/winfsp-2.0/inc/fuse" >> $GITHUB_ENV

      - name: Setup Icon (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          go install github.com/akavel/rsrc@latest
          curl -L https://raw.githubusercontent.com/rclone/rclone/master/graphics/logo/ico/logo_symbol_color.ico -o rclone.ico
          rsrc -ico rclone.ico -o rclone.syso

      # --- BUILD STEP ---
      - name: Build Rclone (${{ matrix.name }})
        shell: bash
        run: |
          # Setup Variabili
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          VERSION="v1.72.0-extra"
          
          # Flag Base: Strip debug (-s -w) e Versione
          LDFLAGS_BASE="-s -w -buildid= -X github.com/rclone/rclone/fs.Version=${VERSION}"
          
          # --- LOGICA SPECIFICA OS ---
          if [ "$GOOS" == "windows" ]; then
            echo "::group::Configuring Windows STATIC Build"
            
            # 1. Configura Compilatore C (MinGW)
            export CGO_ENABLED=1
            export CC=x86_64-w64-mingw32-gcc
            export CXX=x86_64-w64-mingw32-g++
            
            # 2. Header per WinFsp
            export CGO_CFLAGS="-I$WINFSP_INC"
            
            # 3. FORZA LINKING STATICO SUL LATO C
            # Questo obbliga GCC a non usare versioni dinamiche delle lib interne
            export CGO_LDFLAGS="-static"
            
            # 4. Configura Linker Go
            # -extldflags '-static': Passa static al linker esterno
            # Aggiungiamo esplicitamente -static-libgcc per sicurezza
            LDFLAGS="$LDFLAGS_BASE -extldflags '-static -static-libgcc -static-libstdc++'"
            
            TAGS="-tags cmount"
            echo "::endgroup::"
            
          else
            echo "::group::Configuring Linux Pure-Static Build"
            export CGO_ENABLED=0
            TAGS="-tags netgo,osusergo"
            LDFLAGS="$LDFLAGS_BASE"
            echo "::endgroup::"
          fi

          echo "Building for $GOOS/$GOARCH..."
          
          # Esecuzione Build
          go build -v -trimpath -mod=readonly -ldflags "$LDFLAGS" $TAGS -o rclone${{ matrix.ext }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rclone-${{ matrix.name }}
          path: rclone${{ matrix.ext }}
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # JOB 2: ANDROID
  # -------------------------------------------------------------------------
  android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'
          cache: true

      - name: Build Android Targets
        run: |
          VERSION="v1.72.0-android-extra"
          FLAGS="-s -w -buildid= -X github.com/rclone/rclone/fs.Version=${VERSION}"
          
          # Configurazione NDK
          NDK_ROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          API="23" 
          
          for ARCH in arm arm64 386 amd64; do
            echo "::group::Building for Android $ARCH"
            
            export GOOS=android
            export GOARCH=$ARCH
            export CGO_ENABLED=1
            
            # Selezione Compilatore NDK Corretto
            if [ "$ARCH" == "arm" ]; then
              CC_BIN="$NDK_ROOT/armv7a-linux-androideabi${API}-clang"
            elif [ "$ARCH" == "arm64" ]; then
              CC_BIN="$NDK_ROOT/aarch64-linux-android${API}-clang"
            elif [ "$ARCH" == "386" ]; then
              CC_BIN="$NDK_ROOT/i686-linux-android${API}-clang"
            elif [ "$ARCH" == "amd64" ]; then
              CC_BIN="$NDK_ROOT/x86_64-linux-android${API}-clang"
            fi
            
            export CC=$CC_BIN
            
            go build -v -trimpath -mod=readonly -tags android \
              -ldflags "$FLAGS" -o build/rclone-android-$ARCH .
              
            echo "::endgroup::"
          done

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rclone-android-all
          path: build/rclone-android-*
