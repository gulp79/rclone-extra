# Github Actions build for rclone (Custom & Clean)
# Optimized for: Speed (Cache), Portability (Static Linking), and Stability
name: build

on:
  workflow_dispatch:
    inputs:
      manual:
        description: Manual run
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # JOB 1: DESKTOP & SERVER (Linux x64, Linux ARM64, Windows x64)
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- LINUX X64 (Static + Netgo) ---
          - name: linux-amd64
            goos: linux
            goarch: amd64
            ext: ''
            
          # --- LINUX ARM64 (Static + Netgo) ---
          - name: linux-arm64
            goos: linux
            goarch: arm64
            ext: ''

          # --- WINDOWS X64 (CGO + WinFsp + Static) ---
          - name: windows-amd64
            goos: windows
            goarch: amd64
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'
          check-latest: true
          cache: true # Abilita caching automatico di moduli e build

      # --- WINDOWS PRE-REQUISITES ---
      - name: Install MinGW (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Setup WinFsp Headers (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          # Scarica headers per compilare cmount
          wget -q -O winfsp.zip https://github.com/winfsp/winfsp/archive/refs/tags/v2.0.zip
          unzip -q winfsp.zip
          echo "WINFSP_INC=$(pwd)/winfsp-2.0/inc/fuse" >> $GITHUB_ENV

      - name: Setup Icon (Windows Only)
        if: matrix.goos == 'windows'
        run: |
          go install github.com/akavel/rsrc@latest
          curl -L https://raw.githubusercontent.com/rclone/rclone/master/graphics/logo/ico/logo_symbol_color.ico -o rclone.ico
          rsrc -ico rclone.ico -o rclone.syso

      # --- BUILD STEP OTTIMIZZATO ---
      - name: Build Rclone (${{ matrix.name }})
        shell: bash
        run: |
          # --- CONFIGURAZIONE ---
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          
          VERSION="v1.72.0-extra"
          
          # Flag di ottimizzazione:
          # -s -w: Strip debug info (riduce size)
          # -buildid=: Rimuove ID univoco per build riproducibili
          LDFLAGS_BASE="-s -w -buildid= -X github.com/rclone/rclone/fs.Version=${VERSION}"
          
          # --- LOGICA OS ---
          if [ "$GOOS" == "windows" ]; then
            echo "::group::Configuring Windows Build"
            export CGO_ENABLED=1
            export CC=x86_64-w64-mingw32-gcc
            export CXX=x86_64-w64-mingw32-g++
            export CGO_CFLAGS="-I$WINFSP_INC"
            
            # Static Linking Estremo per Windows
            LDFLAGS="$LDFLAGS_BASE -extldflags '-static'"
            TAGS="-tags cmount"
            echo "::endgroup::"
            
          else
            echo "::group::Configuring Linux Build"
            export CGO_ENABLED=0
            
            # 'netgo' usa il resolver DNS Go nativo (no glibc)
            # 'osusergo' usa il lookup utente Go nativo
            TAGS="-tags netgo,osusergo"
            LDFLAGS="$LDFLAGS_BASE"
            echo "::endgroup::"
          fi

          echo "Building for $GOOS/$GOARCH..."
          
          # -mod=readonly: assicura che go.mod non venga modificato
          # -trimpath: rimuove percorsi assoluti dal binario
          go build -v -trimpath -mod=readonly -ldflags "$LDFLAGS" $TAGS -o rclone${{ matrix.ext }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rclone-${{ matrix.name }}
          path: rclone${{ matrix.ext }}
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # JOB 2: ANDROID (Multi-Arch Loop)
  # -------------------------------------------------------------------------
  android:
    name: Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.24'
          cache: true

      - name: Build Android Targets
        run: |
          VERSION="v1.72.0-android-extra"
          FLAGS="-s -w -buildid= -X github.com/rclone/rclone/fs.Version=${VERSION}"
          
          # Setup NDK path (Pre-installato su ubuntu-latest)
          NDK_ROOT="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          # Versione API Android minima (23 = Android 6.0, buon compromesso)
          API="23" 
          
          # Ciclo sulle architetture
          for ARCH in arm arm64 386 amd64; do
            echo "::group::Building for Android $ARCH"
            
            export GOOS=android
            export GOARCH=$ARCH
            export CGO_ENABLED=1
            
            # Selezione dinamica del compilatore CC in base all'architettura
            if [ "$ARCH" == "arm" ]; then
              CC_BIN="$NDK_ROOT/armv7a-linux-androideabi${API}-clang"
            elif [ "$ARCH" == "arm64" ]; then
              CC_BIN="$NDK_ROOT/aarch64-linux-android${API}-clang"
            elif [ "$ARCH" == "386" ]; then
              CC_BIN="$NDK_ROOT/i686-linux-android${API}-clang"
            elif [ "$ARCH" == "amd64" ]; then
              CC_BIN="$NDK_ROOT/x86_64-linux-android${API}-clang"
            fi
            
            export CC=$CC_BIN
            
            echo "Using Compiler: $CC"
            
            # Build
            go build -v -trimpath -mod=readonly -tags android \
              -ldflags "$FLAGS" -o build/rclone-android-$ARCH .
              
            echo "::endgroup::"
          done

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rclone-android-all
          path: build/rclone-android-*
