# Github Actions build for rclone (Custom & Clean)
# Features:
# - Windows: CGO enabled (cmount), Static Linking (no DLL deps), Custom Icon
# - Linux:   CGO disabled (Pure Go), Static Linking, Multi-arch
# - Android: All architectures (Pure Go, no CGO)
# - On tag push: builds everything, uploads assets to the release, submits to WinGet

name: Build rclone-extra - Multi Platform

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Seleziona cosa compilare"
        type: choice
        required: true
        default: all
        options:
          - all
          - linux
          - windows
          - android
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # FIX: era 'read' — serve write per caricare gli asset sulla release

